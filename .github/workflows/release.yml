name: Release

# Tag-driven (hatch-vcs): `git tag vX.Y.Z && git push origin vX.Y.Z`.
# Gated on the Tests suite (reusable workflow) — the release only runs after
# lint, type-check and pytest pass for the tagged commit.
# Builds the sdist/wheel and creates a GitHub Release. This project does not
# publish to PyPI.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Run the full Tests suite against the tagged commit first; release depends
  # on it via `needs`, so a failing build never produces a Release.
  test:
    name: tests
    uses: ./.github/workflows/tests.yml

  release:
    name: build & github release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # hatch-vcs needs the full history + tags to derive the version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
